<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PDU Controller</title>
<style>
:root{
  --bg:#000504;--surface:#0f1518;--card:#131a1f;--border:#313945;
  --accent:#e9fc53;--accent-dim:#b8cc32;--mint:#73facf;
  --on:#73facf;--off:#717780;--text:#fff;--muted:#9d9d9f;
  --danger:#dc2626;--danger-bg:#450a0a;
  --radius:10px;--transition:0.2s ease;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  padding:24px 16px;display:flex;flex-direction:column;align-items:center}
a,button{cursor:pointer}
/* ── Wrapper ── */
.wrapper{width:100%;max-width:720px}
/* ── Modal ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,4,5,.85);
  display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:32px;
  width:min(380px,92vw);box-shadow:0 8px 32px rgba(0,0,0,.6)}
.modal h2{margin-bottom:20px;font-size:1.25rem;color:var(--text);text-align:center}
.modal label{display:block;margin-bottom:4px;font-size:.85rem;color:var(--muted)}
.modal input{width:100%;padding:10px 12px;background:var(--card);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-size:.95rem;margin-bottom:14px;
  transition:border-color var(--transition)}
.modal input:focus{outline:none;border-color:var(--accent)}
.modal .btn-primary{width:100%;margin-top:4px}
.modal p{text-align:center}
.hidden{display:none!important}
/* ── Buttons ── */
.btn{padding:8px 18px;border:none;border-radius:6px;font-size:.9rem;
  font-weight:600;transition:opacity var(--transition),transform var(--transition),
  background var(--transition)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn:not(:disabled):hover{opacity:.88}
.btn:not(:disabled):active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:not(:disabled):hover{background:var(--accent-dim)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:not(:disabled):hover{background:#3d4652}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:not(:disabled):hover{background:#b91c1c}
/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;flex-wrap:wrap;gap:8px;
  padding-bottom:16px;border-bottom:1px solid var(--border)}
header h1{font-size:1.3rem;color:var(--text);font-weight:700;
  letter-spacing:-.01em}
header h1 span{color:var(--accent)}
#status-bar{font-size:.8rem;color:var(--muted)}
/* ── Sections ── */
.section{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;margin-bottom:16px}
.section-title{font-size:.8rem;font-weight:700;color:var(--accent);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
/* ── Relay grid ── */
.relay-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.relay-card{background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;
  display:flex;flex-direction:column;gap:8px;text-align:center}
.relay-name{font-size:.85rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.relay-toggle{padding:10px;font-size:.9rem;border-radius:6px;border:none;
  font-weight:700;transition:background var(--transition),color var(--transition),
  box-shadow var(--transition)}
.relay-toggle.on{background:var(--on);color:var(--bg);
  box-shadow:0 0 12px rgba(115,250,207,.3)}
.relay-toggle.off{background:var(--off);color:#1f2937}
.relay-toggle:disabled{opacity:.35;cursor:not-allowed}
.relay-current{font-size:.75rem;color:var(--muted)}
/* ── Sensors ── */
.sensor-bar{display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.sensor{font-size:.95rem;color:var(--muted)}
.sensor span{color:var(--text);font-weight:600}
/* ── Admin accordion ── */
.accordion-header{display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;user-select:none;padding:2px 0}
.accordion-header:hover .section-title{color:var(--mint)}
.accordion-header .caret{color:var(--accent);transition:transform var(--transition);font-size:.85rem}
.accordion-body{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
/* ── Admin sub-sections ── */
.admin-block{margin-bottom:24px}
.admin-block:last-child{margin-bottom:0}
.admin-block-title{font-weight:600;margin-bottom:12px;font-size:.9rem;color:var(--text)}
.form-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.form-row label{font-size:.85rem;color:var(--muted);min-width:80px}
.form-row input[type=text],.form-row input[type=password]{
  flex:1;padding:7px 10px;background:var(--card);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-size:.9rem;
  transition:border-color var(--transition)}
.form-row input:focus{outline:none;border-color:var(--accent)}
/* ── Table ── */
table{width:100%;border-collapse:collapse;font-size:.85rem;margin-bottom:10px}
th{text-align:left;padding:6px 8px;color:var(--accent);font-size:.75rem;
  text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
td{padding:6px 8px;border-bottom:1px solid #1a2228}
td input[type=text]{background:transparent;border:none;color:var(--text);
  font-size:.85rem;width:100%;outline:none}
td input[type=text]:focus{color:var(--accent)}
/* ── Checkboxes ── */
input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px}
/* ── File input ── */
input[type=file]{color:var(--muted);font-size:.85rem;padding:6px 0}
input[type=file]::file-selector-button{
  background:var(--border);color:var(--text);border:none;
  padding:6px 14px;border-radius:6px;font-size:.85rem;font-weight:600;
  cursor:pointer;margin-right:10px;transition:background var(--transition)}
input[type=file]::file-selector-button:hover{background:#3d4652}
/* ── Progress bar ── */
.progress-wrap{margin-top:10px;display:none}
.progress-wrap.active{display:block}
progress{width:100%;height:8px;border-radius:4px;border:none;overflow:hidden}
progress::-webkit-progress-bar{background:var(--border);border-radius:4px}
progress::-webkit-progress-value{background:linear-gradient(90deg,var(--mint),var(--accent));
  border-radius:4px}
progress::-moz-progress-bar{background:linear-gradient(90deg,var(--mint),var(--accent));
  border-radius:4px}
/* ── Messages ── */
.msg{padding:8px 12px;border-radius:6px;font-size:.85rem;margin-top:8px;display:none;
  text-align:center}
.msg.active{display:block}
.msg.ok{background:rgba(115,250,207,.1);color:var(--on);border:1px solid rgba(115,250,207,.3)}
.msg.err{background:var(--danger-bg);color:#fca5a5;border:1px solid var(--danger)}
/* ── Port checkboxes row ── */
.port-cb-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.port-cb-row span{font-size:.8rem;color:var(--muted);margin-right:2px}
.port-cb-label{font-size:.8rem;display:flex;align-items:center;gap:3px;color:var(--muted)}
/* ── Footer ── */
.footer{margin-top:auto;padding-top:24px;text-align:center;font-size:.75rem;color:var(--muted)}
.footer a{color:var(--mint);text-decoration:none}
.footer a:hover{color:var(--accent)}
</style>
</head>
<body>

<!-- Login modal -->
<div class="modal-backdrop" id="login-modal">
  <div class="modal">
    <h2><span style="color:var(--accent)">PDU</span> Login</h2>
    <label>Username</label>
    <input type="text" id="login-user" autocomplete="username" placeholder="admin"/>
    <label>Password</label>
    <input type="password" id="login-pass" autocomplete="current-password"/>
    <div class="msg" id="login-err"></div>
    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Sign in</button>
  </div>
</div>

<!-- First-login password change modal -->
<div class="modal-backdrop hidden" id="firstlogin-modal">
  <div class="modal">
    <h2>Set New Password</h2>
    <p style="font-size:.85rem;color:var(--muted);margin-bottom:14px">
      Please change the default password before continuing.
    </p>
    <label>New password</label>
    <input type="password" id="fl-new" autocomplete="new-password"/>
    <label>Confirm password</label>
    <input type="password" id="fl-confirm" autocomplete="new-password"/>
    <div class="msg" id="fl-err"></div>
    <button class="btn btn-primary" onclick="doFirstLogin()">Set Password</button>
  </div>
</div>

<!-- Main UI -->
<div id="app" class="hidden wrapper">
  <header>
    <h1><span>Crop</span>DUster</h1>
    <div id="status-bar">v<span id="sb-ver">-</span></div>
  </header>

  <!-- Relays -->
  <div class="section">
    <div class="section-title">Relays</div>
    <div class="relay-grid" id="relay-grid">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Sensors -->
  <div class="section">
    <div class="section-title">Sensors</div>
    <div class="sensor-bar" id="sensor-bar">
      <div class="sensor">Temp: <span id="s-temp">&mdash;</span> &deg;C</div>
      <div class="sensor">Voltage: <span id="s-volt">&mdash;</span> V</div>
    </div>
  </div>

  <!-- Admin (admin-only) -->
  <div class="section hidden" id="admin-section">
    <div class="accordion-header" onclick="toggleAdmin()">
      <span class="section-title" style="margin:0">Admin Panel</span>
      <span class="caret" id="admin-caret">&#9654;</span>
    </div>
    <div class="accordion-body hidden" id="admin-body">

      <!-- Change password -->
      <div class="admin-block">
        <div class="admin-block-title">Change My Password</div>
        <div class="form-row">
          <label>Old</label>
          <input type="password" id="cp-old"/>
        </div>
        <div class="form-row">
          <label>New</label>
          <input type="password" id="cp-new"/>
        </div>
        <button class="btn btn-secondary" onclick="doChangePassword()">Update</button>
        <div class="msg" id="cp-msg"></div>
      </div>

      <!-- Port names -->
      <div class="admin-block">
        <div class="admin-block-title">Port Names</div>
        <table>
          <thead><tr><th>#</th><th>Name</th><th></th></tr></thead>
          <tbody id="port-names-body"><!-- populated by JS --></tbody>
        </table>
      </div>

      <!-- User management -->
      <div class="admin-block">
        <div class="admin-block-title">Users</div>
        <div style="font-size:.8rem;color:var(--muted);margin-bottom:8px">New user:</div>
        <div class="form-row">
          <input type="text" id="nu-user" placeholder="username"/>
          <input type="password" id="nu-pass" placeholder="password"/>
        </div>
        <div class="form-row port-cb-row" id="nu-ports-row">
          <!-- port checkboxes populated by JS -->
        </div>
        <div class="form-row">
          <label class="port-cb-label"><input type="checkbox" id="nu-admin"/> Admin</label>
        </div>
        <button class="btn btn-secondary" onclick="doCreateUser()">Create User</button>
        <div class="msg" id="nu-msg"></div>
      </div>

      <!-- Firmware update -->
      <div class="admin-block">
        <div class="admin-block-title">Firmware Update</div>
        <input type="file" id="fw-file" accept=".bin,.uf2"/>
        <div style="margin-top:8px">
          <button class="btn btn-secondary" onclick="doFirmwareUpload()">Upload</button>
        </div>
        <div class="progress-wrap" id="fw-progress-wrap">
          <progress id="fw-progress" value="0" max="100"></progress>
        </div>
        <div class="msg" id="fw-msg"></div>
      </div>

      <!-- Factory reset -->
      <div class="admin-block">
        <div class="admin-block-title">Factory Reset</div>
        <button class="btn btn-danger" onclick="doFactoryReset()">Reset to Defaults</button>
        <div class="msg" id="fr-msg"></div>
      </div>

    </div>
  </div>

  <div class="footer">
    <a href="https://9esec.io" target="_blank" rel="noopener">9elements Cyber Security</a>
  </div>
</div>

<script>
// Credential storage (sessionStorage -- cleared on tab close)
const SESSION_KEY = 'pdu_creds'; // base64 "user:pass"

function getCreds() { return sessionStorage.getItem(SESSION_KEY); }
function setCreds(b64) { sessionStorage.setItem(SESSION_KEY, b64); }
function clearCreds() { sessionStorage.removeItem(SESSION_KEY); }

function authHeader() {
  const c = getCreds();
  return c ? { 'Authorization': 'Basic ' + c } : {};
}

// API helpers
async function api(method, path, body) {
  const opts = { method, headers: { ...authHeader() } };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  if (r.status === 401) { handle401(); throw new Error('401'); }
  return r;
}

function handle401() {
  clearCreds();
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-modal').classList.remove('hidden');
  showMsg('login-err', 'Session expired. Please log in again.', false);
}

// Message helpers
function showMsg(id, text, ok) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg active ' + (ok ? 'ok' : 'err');
  setTimeout(() => el.classList.remove('active'), 5000);
}

// Login
async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if (!u || !p) { showMsg('login-err', 'Enter username and password.', false); return; }

  const b64 = btoa(u + ':' + p);
  setCreds(b64);

  try {
    const r = await fetch('/api/status', { headers: { 'Authorization': 'Basic ' + b64 } });
    if (r.status === 401) {
      clearCreds();
      showMsg('login-err', 'Invalid credentials.', false);
      return;
    }
    const data = await r.json();
    document.getElementById('login-modal').classList.add('hidden');
    if (data.first_login) {
      document.getElementById('firstlogin-modal').classList.remove('hidden');
    } else {
      initApp(data);
    }
  } catch(e) {
    showMsg('login-err', 'Connection error.', false);
  }
}

// Enter key on login form
document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// First-login password change
async function doFirstLogin() {
  const np = document.getElementById('fl-new').value;
  const cp = document.getElementById('fl-confirm').value;
  if (!np) { showMsg('fl-err', 'Enter a new password.', false); return; }
  if (np !== cp) { showMsg('fl-err', 'Passwords do not match.', false); return; }

  // We need the current (old) password -- it is still in sessionStorage creds
  const creds = atob(getCreds() || '');
  const old = creds.split(':').slice(1).join(':');

  try {
    const r = await api('POST', '/api/admin/password', { old, new: np });
    if (!r.ok) { showMsg('fl-err', 'Failed to set password.', false); return; }

    // Update stored credentials
    const user = creds.split(':')[0];
    setCreds(btoa(user + ':' + np));

    document.getElementById('firstlogin-modal').classList.add('hidden');
    const status = await (await api('GET', '/api/status')).json();
    initApp(status);
  } catch(e) {
    if (e.message !== '401') showMsg('fl-err', 'Error: ' + e.message, false);
  }
}

// App initialisation
async function initApp(status) {
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('sb-ver').textContent = status.version || '?';

  // Determine if admin -- try fetching a port name (admin endpoints are protected)
  let isAdmin = false;
  try {
    const r = await api('GET', '/api/port/0/name');
    if (r.ok) {
      isAdmin = true;
    }
  } catch(_) {}

  buildRelayGrid();
  loadRelays();
  if (isAdmin) {
    document.getElementById('admin-section').classList.remove('hidden');
    buildPortNamesTable();
    buildNewUserPortCheckboxes();
  }

  loadSensors();
  setInterval(loadSensors, 10000);
}

// Relay grid
const PORT_COUNT = 8;

function buildRelayGrid() {
  const grid = document.getElementById('relay-grid');
  grid.innerHTML = '';
  for (let i = 0; i < PORT_COUNT; i++) {
    const card = document.createElement('div');
    card.className = 'relay-card';
    card.innerHTML = `
      <div class="relay-name" id="rn-${i}">Port ${i}</div>
      <button class="relay-toggle off" id="rt-${i}" onclick="toggleRelay(${i})">OFF</button>
      <div class="relay-current" id="rc-${i}">0.0 A</div>`;
    grid.appendChild(card);
  }
}

async function loadRelays() {
  for (let i = 0; i < PORT_COUNT; i++) {
    try {
      const r = await api('GET', `/api/gpio/${i}`);
      if (!r.ok) continue;
      const d = await r.json();
      updateRelayCard(d);
      // Load port name
      const nr = await api('GET', `/api/port/${i}/name`);
      if (nr.ok) {
        const nd = await nr.json();
        const el = document.getElementById(`rn-${i}`);
        if (el && nd.name) el.textContent = nd.name;
      }
    } catch(_) {}
  }
}

function updateRelayCard(d) {
  const btn = document.getElementById(`rt-${d.pin}`);
  if (!btn) return;
  btn.textContent = d.state ? 'ON' : 'OFF';
  btn.className = 'relay-toggle ' + (d.state ? 'on' : 'off');
  btn.disabled = !d.allowed;
}

async function toggleRelay(pin) {
  try {
    const r = await api('POST', `/api/gpio/${pin}/toggle`);
    if (!r.ok) return;
    const d = await r.json();
    const btn = document.getElementById(`rt-${pin}`);
    if (btn) {
      btn.textContent = d.state ? 'ON' : 'OFF';
      btn.className = 'relay-toggle ' + (d.state ? 'on' : 'off');
    }
  } catch(_) {}
}

// Sensors
async function loadSensors() {
  try {
    const r = await api('GET', '/api/sensors');
    if (!r.ok) return;
    const d = await r.json();
    document.getElementById('s-temp').textContent = d.temperature_c.toFixed(1);
    document.getElementById('s-volt').textContent = d.voltage_v.toFixed(1);
    // Update per-port current
    if (Array.isArray(d.current_a)) {
      for (let i = 0; i < d.current_a.length && i < PORT_COUNT; i++) {
        const el = document.getElementById(`rc-${i}`);
        if (el) el.textContent = d.current_a[i].toFixed(1) + ' A';
      }
    }
  } catch(_) {}
}

// Admin accordion
function toggleAdmin() {
  const body = document.getElementById('admin-body');
  const caret = document.getElementById('admin-caret');
  const open = !body.classList.contains('hidden');
  body.classList.toggle('hidden', open);
  caret.style.transform = open ? '' : 'rotate(90deg)';
}

// Change password
async function doChangePassword() {
  const old = document.getElementById('cp-old').value;
  const np  = document.getElementById('cp-new').value;
  if (!old || !np) { showMsg('cp-msg', 'Fill in both fields.', false); return; }
  try {
    const r = await api('POST', '/api/admin/password', { old, new: np });
    if (r.ok) {
      const creds = atob(getCreds());
      const user = creds.split(':')[0];
      setCreds(btoa(user + ':' + np));
      showMsg('cp-msg', 'Password changed.', true);
      document.getElementById('cp-old').value = '';
      document.getElementById('cp-new').value = '';
    } else {
      showMsg('cp-msg', 'Failed (wrong old password?).', false);
    }
  } catch(e) { if (e.message !== '401') showMsg('cp-msg', 'Error.', false); }
}

// Port names
async function buildPortNamesTable() {
  const tbody = document.getElementById('port-names-body');
  tbody.innerHTML = '';
  for (let i = 0; i < PORT_COUNT; i++) {
    let name = `Port ${i}`;
    try {
      const r = await api('GET', `/api/port/${i}/name`);
      if (r.ok) { const d = await r.json(); if (d.name) name = d.name; }
    } catch(_) {}
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${i}</td>
      <td><input type="text" id="pn-${i}" value="${name}"/></td>
      <td><button class="btn btn-secondary" style="padding:4px 10px;font-size:.8rem"
          onclick="savePortName(${i})">Save</button></td>`;
    tbody.appendChild(tr);
  }
}

async function savePortName(i) {
  const name = document.getElementById(`pn-${i}`).value.trim();
  try {
    const r = await api('POST', `/api/port/${i}/name`, { name });
    if (r.ok) {
      const el = document.getElementById(`rn-${i}`);
      if (el) el.textContent = name;
    }
  } catch(_) {}
}

// New user checkboxes
function buildNewUserPortCheckboxes() {
  const row = document.getElementById('nu-ports-row');
  row.innerHTML = '<span>Ports:</span>';
  for (let i = 0; i < PORT_COUNT; i++) {
    const lbl = document.createElement('label');
    lbl.className = 'port-cb-label';
    lbl.innerHTML = `<input type="checkbox" class="nu-port-cb" data-port="${i}" checked/>${i}`;
    row.appendChild(lbl);
  }
}

async function doCreateUser() {
  const username = document.getElementById('nu-user').value.trim();
  const password = document.getElementById('nu-pass').value;
  if (!username || !password) { showMsg('nu-msg', 'Enter username and password.', false); return; }

  let ports = 0;
  document.querySelectorAll('.nu-port-cb').forEach(cb => {
    if (cb.checked) ports |= (1 << parseInt(cb.dataset.port));
  });
  const admin = document.getElementById('nu-admin').checked;

  try {
    const r = await api('POST', '/api/admin/users', { username, password, ports, admin });
    if (r.ok) {
      showMsg('nu-msg', `User "${username}" created.`, true);
      document.getElementById('nu-user').value = '';
      document.getElementById('nu-pass').value = '';
    } else {
      showMsg('nu-msg', 'Failed to create user.', false);
    }
  } catch(e) { if (e.message !== '401') showMsg('nu-msg', 'Error.', false); }
}

// Firmware upload
async function doFirmwareUpload() {
  const fileInput = document.getElementById('fw-file');
  if (!fileInput.files || !fileInput.files[0]) {
    showMsg('fw-msg', 'Select a firmware file first.', false); return;
  }
  const file = fileInput.files[0];
  const wrap = document.getElementById('fw-progress-wrap');
  const bar  = document.getElementById('fw-progress');

  wrap.classList.add('active');
  bar.value = 0;

  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/update');
  const creds = getCreds();
  if (creds) xhr.setRequestHeader('Authorization', 'Basic ' + creds);
  xhr.setRequestHeader('Content-Type', 'application/octet-stream');

  xhr.upload.onprogress = e => {
    if (e.lengthComputable) bar.value = Math.round(e.loaded / e.total * 100);
  };

  xhr.onload = () => {
    wrap.classList.remove('active');
    if (xhr.status === 200) {
      showMsg('fw-msg', 'Firmware uploaded. Device rebooting...', true);
    } else if (xhr.status === 401) {
      handle401();
    } else {
      showMsg('fw-msg', 'Upload failed (HTTP ' + xhr.status + ').', false);
    }
  };
  xhr.onerror = () => {
    wrap.classList.remove('active');
    showMsg('fw-msg', 'Network error during upload.', false);
  };

  xhr.send(file);
}

// Factory reset
async function doFactoryReset() {
  if (!confirm('Reset ALL settings to factory defaults? This cannot be undone.')) return;
  try {
    await api('POST', '/api/admin/reset');
    showMsg('fr-msg', 'Factory reset initiated. Device rebooting...', true);
  } catch(e) { if (e.message !== '401') showMsg('fr-msg', 'Error.', false); }
}

// Startup -- check existing session
(async function startup() {
  if (getCreds()) {
    try {
      const r = await fetch('/api/status', { headers: authHeader() });
      if (r.ok) {
        const d = await r.json();
        document.getElementById('login-modal').classList.add('hidden');
        if (d.first_login) {
          document.getElementById('firstlogin-modal').classList.remove('hidden');
        } else {
          initApp(d);
        }
        return;
      }
    } catch(_) {}
  }
  // Show login
})();
</script>
